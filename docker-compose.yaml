services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: proviemplea_app

    working_dir: /var/www

    volumes:
      - ./:/var/www

    depends_on:
      - db

  web:
    image: nginx:stable-alpine

    container_name: proviemplea_web

    ports:
      - "8080:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  db:
    image: mysql:8.0

    container_name: proviemplea_db

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: proviemplea
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: proviemplea_user
      MYSQL_PASSWORD: proviemplea_pass

    ports:
      - "3307:3306"

    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
